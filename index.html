<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bài trắc nghiệm</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    padding: 10px;
    max-width: 600px;
    margin: auto;
}
h2 { font-size: 1.5em; text-align: center; }
.question { margin-bottom: 25px; }
button {
    margin: 5px 0;
    display: block;
    text-align: left;
    width: 100%;
    padding: 10px 15px;
    font-size: 1em;
    box-sizing: border-box;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.2s;
}
button:hover { background-color: #f0f0f0; }
.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }
</style>
</head>
<body>

<h2>Bài trắc nghiệm 20 câu</h2>
<div id="quiz"></div>

<script>
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

const questions = [

{
q: "Câu 1: Đồng chí cho biết Thủ đoạn chiến lược “diễn biến hòa bình” của các thế lực thù địch chống phá cách mạng Việt Nam là gì?",
answers: [
"Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại",
"Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh",
"Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại",
"Chống phá trên lĩnh vực chính trị; chống phá trên lĩnh vực kinh tế; chống phá trên lĩnh vực tư tưởng, văn hóa; chống phá trên lĩnh vực xã hội; chống phá trên lĩnh vực quốc phòng, an ninh; chống phá trên lĩnh vực đối ngoại"
],
correct: 3
},

{
q: "Câu 2: Đồng chí cho biết Nghị quyết Đại hội đại biểu toàn quốc lần thứ XIII của Đảng xác định mục tiêu cụ thể của nước ta đến năm 2025 là gì?",
answers: [
"Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp hiện đại, có thu nhập trung bình thấp",
"Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp theo hướng hiện đại, vượt qua mức thu nhập trung bình thấp",
"Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước phát triển, có công nghiệp hiện đại, thu nhập trung bình cao",
"Kỷ niệm 50 năm giải phóng hoàn toàn Miền Nam, thống nhất đất nước: Là nước đang phát triển, có công nghiệp theo hướng hiện đại, có mức thu nhập trung bình cao"
],
correct: 1
},

{
q: "Câu 3: Đồng chí cho biết chức năng của công tác tuyên truyền miệng ?",
answers: [
"Phổ biến thông tin. Định hướng tư tưởng. Hướng dẫn hành động",
"Phổ biến thông tin. Định hướng tư tưởng. Cổ vũ hành động",
"Phổ biến thông tin. Định hướng nhận thức. Cổ vũ hành động",
"Phổ biến thông tin. Định hướng nhận thức. Hướng dẫn hành động"
],
correct: 1
},

{
q: "Câu 4: Đồng chí cho biết Chỉ thị số 366/CT-ĐU của Ban Thường vụ Đảng ủy Sư đoàn về xây dựng “chi bộ bốn tốt”, “đảng bộ cơ sở bốn tốt\" xác định bao nhiêu nhiệm vụ, giải pháp?",
answers: ["4 nhiệm vụ, giải pháp","5 nhiệm vụ, giải pháp","6 nhiệm vụ, giải pháp","7 nhiệm vụ, giải pháp"],
correct: 1
},

{
q: "Câu 5: Đồng chí cho biết tên gọi Kết luận số 21-KL/TW của Ban Chấp hành Trung ương Đảng khóa XIII là gì?",
answers: [
"Về đẩy mạnh xây dựng, chỉnh đốn đảng; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm cán bộ, đảng viên suy thoái...",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; ngăn chặn, đẩy lùi...",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết ngăn chặn, đẩy lùi, xử lý nghiêm...",
"Về đẩy mạnh xây dựng, chỉnh đốn đảng và hệ thống chính trị; kiên quyết đẩy lùi..."
],
correct: 2
},

{
q: "Câu 6: Đồng chí cho biết Quy định số 144-QĐ/TW ngày 09/5/2024 của Bộ Chính trị có mấy nội dung cơ bản?",
answers: ["04 nội dung","05 nội dung","06 nội dung","07 nội dung"],
correct: 1
},

{
q: "Câu 7: Đồng chí cho biết có mấy nguyên tắc tiến hành công tác tuyên truyền miệng?",
answers: ["04 nhiệm vụ","05 nhiệm vụ","06 nhiệm vụ","10 nhiệm vụ"],
correct: 1
},

{
q: "Câu 8: Đồng chí khái niệm của công tác tuyên truyền miệng là gì?",
answers: [
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp trực tiếp giữa người nói...",
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp bằng lời nói trực tiếp...",
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua sự giao tiếp thực tiễn bằng lời nói...",
"Tuyên truyền miệng là một hình thức tuyên truyền được tiến hành thông qua nói chuyện bằng lời nói trực tiếp..."
],
correct: 1
},

{
q: "Câu 9: Đồng chí cho biết chức năng Phòng Hồ Chí Minh theo Quy chế tổ chức hoạt động của các thiết chế văn hóa trong Quân đội nhân dân Việt Nam?",
answers: [
"Tổ chức các hoạt động văn hoá - văn nghệ...",
"Hướng dẫn, tổ chức các hoạt động văn hoá - văn nghệ...",
"Chỉ đạo, tổ chức các hoạt động văn hoá - văn nghệ...",
"Tham gia, tổ chức, hướng dẫn các hoạt động văn hoá - văn nghệ..."
],
correct: 1
},

{
q: "Câu 10: Đồng chí cho biết báo cáo viên kiêm nhiệm ở cấp tiểu đoàn, đại đội và tương đương là ai?",
answers: [
"Chính trị viên đảm nhiệm",
"Chính trị viên hoặc Chính trị viên phó đảm nhiệm",
"Bí thư Đảng ủy đảm nhiệm",
"Phó bí thư đảm nhiệm"
],
correct: 1
}

];

shuffle(questions);

const quizDiv = document.getElementById("quiz");

questions.forEach((q, index) => {
    const div = document.createElement("div");
    div.classList.add("question");

    const title = document.createElement("p");
    title.innerText = `Câu ${index + 1}: ${q.q}`;
    div.appendChild(title);

    let answers = q.answers.map((a,i) => ({ text: a, correct: i === q.correct }));
    shuffle(answers);

    answers.forEach((ans, i) => {
        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65 + i) + ". " + ans.text;
        btn.onclick = () => {
            if (ans.correct) {
                btn.classList.add("correct");
                btn.innerText += " ✅ Đúng";
                // khóa cả div câu hỏi
                Array.from(div.getElementsByTagName("button")).forEach(b => b.disabled = true);
            } else {
                btn.classList.add("wrong");
                btn.innerText += " ❌ Sai";
            }
        };
        div.appendChild(btn);
    });

    quizDiv.appendChild(div);
});
</script>

</body>
</html>
